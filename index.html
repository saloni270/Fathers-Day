<!DOCTYPE html>
<html>
<head>
  <title>Happy Father's Day</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #9be7ff, #fff6d6);
      text-align: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    h1 {
      font-size: 50px;
      color: #003366;
      margin-top: 40px;
      text-shadow: 2px 2px white;
    }

    h2 {
      color: #333;
      margin-bottom: 50px;
    }

    .balloons {
      display: flex;
      justify-content: center;
      gap: 35px;
      flex-wrap: wrap;
      margin-top: 40px;
    }

    .balloon {
      width: 110px;
      height: 140px;
      border-radius: 50%;
      cursor: pointer;
      position: relative;
      color: white;
      font-size: 28px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 20px rgba(0,0,0,0.25);
      transition: 0.3s;
    }

    .balloon:hover {
      transform: translateY(-10px) scale(1.08);
    }

    .balloon::after {
      content: "";
      position: absolute;
      width: 2px;
      height: 95px;
      background: #333;
      top: 140px;
      left: 55px;
    }

    .balloon:nth-child(1) { background: #ff4d4d; }
    .balloon:nth-child(2) { background: #4d79ff; }
    .balloon:nth-child(3) { background: #33cc33; }
    .balloon:nth-child(4) { background: #ffcc00; }
    .balloon:nth-child(5) { background: #cc66ff; }

    .popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.65);
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .popup-content {
      background: white;
      padding: 25px;
      border-radius: 20px;
      width: 85%;
      max-width: 420px;
      box-shadow: 0 0 30px rgba(255,255,255,0.6);
      animation: pop 0.4s ease;
    }

    @keyframes pop {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .popup img {
      width: 100%;
      max-height: 350px;
      object-fit: cover;
      border-radius: 15px;
    }

    .note {
      margin-top: 15px;
      font-size: 20px;
      color: #333;
    }

    button {
      margin-top: 15px;
      padding: 10px 25px;
      border: none;
      background: #003366;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      top: -10px;
      z-index: 100;
      animation: fall 3s linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <h1>🎉 Happy Father's Day 🎉</h1>
  <h2>Click each balloon for a surprise 🎈</h2>

  <div class="balloons">
    <div class="balloon" onclick="showPhoto(1)">1</div>
    <div class="balloon" onclick="showPhoto(2)">2</div>
    <div class="balloon" onclick="showPhoto(3)">3</div>
    <div class="balloon" onclick="showPhoto(4)">4</div>
    <div class="balloon" onclick="showPhoto(5)">5</div>
  </div>

  <div class="popup" id="popup">
    <div class="popup-content">
      <img id="popupImage">
      <div class="note" id="popupNote"></div>
      <button onclick="closePopup()">Close</button>
    </div>
  </div>

 <script>
    const photos = [
      "p1.jpeg",
      "P2.jpeg",
      "P3.jpeg",
      "P4.jpeg",
      "P5.jpeg"
    ];


    const notes = [
      "Thank you for always being there for me. ❤️",
      "You are my hero and my biggest supporter. Love you, Papa! 💙",
      "Thank you for your love, care, and endless encouragement. 😊",
      "Every memory with you is special. Happy Father's Day! 🌟",
      "I am lucky to have a father as wonderful as you. Love you always! 🥰"
    ];

    function showPhoto(number) {
      document.getElementById("popupImage").src = photos[number - 1];
      document.getElementById("popupNote").innerText = notes[number - 1];
      document.getElementById("popup").style.display = "flex";
      createConfetti();
    }

    function closePopup() {
      document.getElementById("popup").style.display = "none";
    }

    function createConfetti() {
      const colors = ["#ff4d4d", "#4d79ff", "#33cc33", "#ffcc00", "#cc66ff", "#ff66b2"];

      for (let i = 0; i < 80; i++) {
        let confetti = document.createElement("div");
        confetti.className = "confetti";
        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDuration = (Math.random() * 2 + 2) + "s";
        confetti.style.borderRadius = Math.random() > 0.5 ? "50%" : "0";
        document.body.appendChild(confetti);

        setTimeout(() => {
          confetti.remove();
        }, 4000);
      }
    }
  </script>

</body>
</html>
