<!DOCTYPE html>
<html>
<head>
  <title>Happy Father's Day</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(160deg, #9be7ff, #fff3b0);
      min-height: 100vh;
      overflow: hidden;
      text-align: center;
    }

    h1 {
      font-size: 38px;
      color: #003366;
      margin-top: 35px;
    }

    h2 {
      font-size: 18px;
      color: #333;
    }

    .screen {
      position: relative;
      width: 100vw;
      height: 75vh;
    }

    .balloon {
      width: 85px;
      height: 110px;
      border-radius: 50%;
      position: absolute;
      color: white;
      font-size: 25px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 25px rgba(0,0,0,0.25);
      animation: float 3s ease-in-out infinite;
      cursor: pointer;
    }

    .balloon::after {
      content: "";
      position: absolute;
      width: 2px;
      height: 70px;
      background: #333;
      top: 110px;
      left: 42px;
    }

    .b1 { background: #ff4d4d; left: 8%; top: 8%; }
    .b2 { background: #4d79ff; right: 10%; top: 15%; animation-delay: .4s; }
    .b3 { background: #33cc33; left: 38%; top: 32%; animation-delay: .8s; }
    .b4 { background: #ffcc00; left: 12%; bottom: 18%; animation-delay: 1.2s; }
    .b5 { background: #cc66ff; right: 12%; bottom: 12%; animation-delay: 1.6s; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-18px); }
    }

    .popup {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .popup-content {
      background: white;
      padding: 18px;
      border-radius: 20px;
      width: 86%;
      max-width: 380px;
      animation: pop .4s ease;
    }

    @keyframes pop {
      from { transform: scale(.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .popup img {
      width: 100%;
      max-height: 360px;
      object-fit: cover;
      border-radius: 15px;
    }

    .note {
      margin-top: 12px;
      font-size: 18px;
      color: #333;
    }

    button {
      margin-top: 15px;
      padding: 10px 22px;
      border: none;
      background: #003366;
      color: white;
      border-radius: 10px;
      font-size: 16px;
    }

    .confetti {
      position: fixed;
      width: 9px;
      height: 9px;
      top: -10px;
      z-index: 100;
      animation: fall 3s linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <h1>🎉 Happy Father's Day 🎉</h1>
  <h2>Click each balloon for a surprise 🎈</h2>

  <div class="screen">
    <div class="balloon b1" onclick="showPhoto(1)">1</div>
    <div class="balloon b2" onclick="showPhoto(2)">2</div>
    <div class="balloon b3" onclick="showPhoto(3)">3</div>
    <div class="balloon b4" onclick="showPhoto(4)">4</div>
    <div class="balloon b5" onclick="showPhoto(5)">5</div>
  </div>

  <div class="popup" id="popup">
    <div class="popup-content">
      <img id="popupImage">
      <div class="note" id="popupNote"></div>
      <button onclick="closePopup()">Close</button>
    </div>
  </div>

  <script>
    const photos = [
      "p1.jpeg",
      "P2.jpeg",
      "P3.jpeg",
      "P4.jpeg",
      "P5.jpeg"
    ];

    const notes = [
      "Thank you for always being there for me. ❤️",
      "You are my hero and my biggest supporter. Love you, Papa! 💙",
      "Thank you for your love, care, and endless encouragement. 😊",
      "Every memory with you is special. Happy Father's Day! 🌟",
      "I am lucky to have a father as wonderful as you. Love you always! 🥰"
    ];

    function showPhoto(number) {
      document.getElementById("popupImage").src = photos[number - 1];
      document.getElementById("popupNote").innerText = notes[number - 1];
      document.getElementById("popup").style.display = "flex";
      createConfetti();
    }

    function closePopup() {
      document.getElementById("popup").style.display = "none";
    }

    function createConfetti() {
      const colors = ["#ff4d4d", "#4d79ff", "#33cc33", "#ffcc00", "#cc66ff"];

      for (let i = 0; i < 80; i++) {
        let c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random() * 100 + "vw";
        c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        c.style.animationDuration = (Math.random() * 2 + 2) + "s";
        document.body.appendChild(c);

        setTimeout(() => c.remove(), 4000);
      }
    }
  </script>

</body>
</html>
